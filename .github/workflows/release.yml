# Publishes to npm on every v* tag via OIDC trusted publishing —
# npmjs.com trusts this repo+workflow directly, so there are no tokens
# to store, rotate or steal, and provenance is attested automatically.
# Requires npm >= 11.5 (hence the npm upgrade step).
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # provenance (and OIDC once trusted publishing is on)
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      # prepublishOnly runs build + tests + typecheck before the upload.
      - run: npm publish
